name: Build, Test & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g., v1.0.0). Leave empty for auto semantic versioning.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  PKG_NAME: discord-fix

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.semantic.outputs.new_tag }}
      previous_tag: ${{ steps.semantic.outputs.previous_tag }}
      version: ${{ steps.semantic.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: semantic
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          custom_tag: ${{ inputs.version }}

  build-and-test:
    needs: version
    if: needs.version.outputs.new_tag != needs.version.outputs.previous_tag
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    outputs:
      pkgfile: ${{ steps.pkgname.outputs.pkgfile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel jq procps-ng discord git sudo
          pacman-key --init
          sed -i 's/^SIGNPKG=.*/SIGNPKG=no/' /etc/makepkg.conf

      - name: Setup builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/builder
          chown -R builder:builder .

      - name: Update PKGBUILD version
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ needs.version.outputs.version }}/" PKGBUILD
          echo "Version: ${{ needs.version.outputs.version }}"

      - name: Build package
        run: |
          su builder -c "makepkg -s --noconfirm --nosign"

          for f in *.pkg.tar.zst; do
            sha256sum "$f" > "${f}.sha256"
            sha512sum "$f" > "${f}.sha512"
          done

          echo "Build completed"

      - name: Get package filename
        id: pkgname
        run: |
          PKGFILE=$(ls *.pkg.tar.zst | head -1)
          echo "pkgfile=$PKGFILE" >> $GITHUB_OUTPUT
          echo "Package: $PKGFILE"

      - name: Test in mock environment
        run: |
          TEST_HOME=$(mktemp -d)
          mkdir -p "$TEST_HOME/.config/discord"

          cat > "$TEST_HOME/.config/discord/settings.json" << 'JSON'
          {
            "SKIP_HOST_UPDATE": false,
            "IS_MAXIMIZED": true,
            "IS_MINIMIZED": false,
            "SHOULD_ASK_FOR_HARDWARE_ACCELERATION": true,
            "START_MINIMIZED": false,
            "LAST_RUN_VERSION": "0.0.99"
          }
          JSON

          echo "Initial settings:"
          cat "$TEST_HOME/.config/discord/settings.json"

          mkdir -p /usr/bin
          echo '#!/bin/bash' > /usr/bin/discord
          chmod +x /usr/bin/discord

          echo "Testing script..."
          export HOME_OVERRIDE="$TEST_HOME"
          bash discord-fix-script.sh

          echo "Final settings:"
          cat "$TEST_HOME/.config/discord/settings.json"

          echo "Verifying SKIP_HOST_UPDATE = true..."
          jq -e '.SKIP_HOST_UPDATE == true' "$TEST_HOME/.config/discord/settings.json" || {
            echo "TEST FAILED: SKIP_HOST_UPDATE not set to true"
            exit 1
          }

          echo "Verifying other keys preserved..."
          for key in IS_MAXIMIZED IS_MINIMIZED SHOULD_ASK_FOR_HARDWARE_ACCELERATION START_MINIMIZED LAST_RUN_VERSION; do
            if ! jq -e --arg key "$key" 'has($key)' "$TEST_HOME/.config/discord/settings.json" >/dev/null; then
              echo "TEST FAILED: $key was removed"
              exit 1
            fi
          done

          echo "Checking backup created..."
          ls "$TEST_HOME/.config/discord/settings.json.discord-fix-backup-"* >/dev/null 2>&1 || {
            echo "TEST FAILED: Backup not created"
            exit 1
          }

          echo "All tests passed - JSON structure preserved"
          rm -rf "$TEST_HOME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            *.pkg.tar.zst
            *.pkg.tar.zst.sha256
            *.pkg.tar.zst.sha512
            PKGBUILD
            discord-fix-script.sh
            discord-fix.hook
            LICENSE

  release:
    needs: [version, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Update PKGBUILD checksums
        run: |
          CHECKSUM1=$(sha512sum discord-fix-script.sh | cut -d' ' -f1)
          CHECKSUM2=$(sha512sum discord-fix.hook | cut -d' ' -f1)
          CHECKSUM3=$(sha512sum LICENSE | cut -d' ' -f1)
          NEW_CHECKSUMS="sha512sums=('$CHECKSUM1' '$CHECKSUM2' '$CHECKSUM3')"
          sed -i "s|^sha512sums=.*|$NEW_CHECKSUMS|" PKGBUILD

          echo "Updated PKGBUILD:"
          cat PKGBUILD

          echo "Verifying checksums..."
          sha512sum discord-fix-script.sh discord-fix.hook LICENSE

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD
          git commit -m "chore(release): ${{ needs.version.outputs.version }}" || echo "No changes"

          git push origin main || echo "Push failed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.version.outputs.new_tag }}"
          name: "Release ${{ needs.version.outputs.new_tag }}"
          files: |
            ${{ needs.build-and-test.outputs.pkgfile }}
            ${{ needs.build-and-test.outputs.pkgfile }}.sha256
            ${{ needs.build-and-test.outputs.pkgfile }}.sha512
          generate_release_notes: true
          make_latest: true
          body: |
            ## Quick Install
            ```bash
            curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep -Eo 'https://[^"]+\.pkg\.tar\.zst' | head -1 | xargs curl -L -o /tmp/pkg.tar.zst && sudo pacman -U /tmp/pkg.tar.zst
            ```

            ## Manual Install
            ```bash
            sudo pacman -U ${{ needs.build-and-test.outputs.pkgfile }}
            ```

            ## Checksums
            See attached `.sha256` and `.sha512` files.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
